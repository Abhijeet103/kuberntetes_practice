apiVersion : app/v1
kind : deployment
metadata :
  name : app
specs :
  replicas : 2
  selector :
      matchLabels :
          app : my-app
  template :
      metadata :
        labels :
          app : my-app
      specs :
        containers :
          - name : my-app-pods
            image  : nginx:latest
            ports :
              - containerPort : 80

        livenessProbe :
          httpGet :
            path : /
            port : 80
          initialDelaySeconds : 10
          periodSeconds : 5

        readinessProbe  :
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 5





